[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["ejs"]
  included_files = ["views/**", "public/**"]

[[redirects]]
  from = "https://sharefile0x1.netlify.app/*"
  to = "https://burnlink.page/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://sharefile0x1.netlify.app/*"
  to = "https://burnlink.page/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/"
  to = "/.netlify/functions/app"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/app/:splat"
  status = 200

# ── Security headers ──────────────────────────────────────────────────────────
# Non-CSP headers are safe to set globally — they don't conflict with Express.
# CSP is intentionally NOT set here for dynamic routes (/s/*, /file/*) because
# Express sets a nonce-based CSP for those pages. If netlify.toml also set a
# CSP for those routes, browsers would apply BOTH (stricter wins), blocking the
# nonce-validated inline key-capture script and breaking decryption entirely.
# The /*  CSP below only affects static files served directly from Netlify CDN.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://challenges.cloudflare.com; connect-src 'self' https://*.supabase.co; img-src 'self' data: https://api.producthunt.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'"
